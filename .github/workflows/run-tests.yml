name: "🚀 CI — Test Runner (Shopfast)"

on:
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    name: "Executar Bateria de Testes Pytest"
    runs-on: ubuntu-latest

    steps:
    - name: "📥 Checkout do código"
      uses: actions/checkout@v4

    - name: "🐍 Configurar Python 3.9"
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: "📦 Instalar Dependências"
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: "🧪 Rodar Testes de Unidade (Pagamentos)"
      run: |
        python -m pytest tests/test_pagamentos.py -v

    - name: "🏗️ Rodar Testes de Integração (Carrinho SQLite)"
      run: |
        python -m pytest tests/test_carrinho_integracao.py -v
